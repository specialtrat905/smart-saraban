<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบสารบรรณ ศกศ.ตราด (GitHub Version)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f7f6; font-family: 'Sarabun', sans-serif; }
    .login-container { max-width: 400px; margin: 60px auto; }
    .main-app { display: none; }
    .nav-custom { background: #004d40; color: white; }
  </style>
</head>
<body>

<div id="loginPage" class="container login-container">
  <div class="card p-4 shadow-sm border-0">
    <h4 class="text-center mb-4">เข้าสู่ระบบ (GitHub)</h4>
    <input type="text" id="user" class="form-control mb-3" placeholder="ชื่อผู้ใช้">
    <input type="password" id="pass" class="form-control mb-3" placeholder="รหัสผ่าน">
    <button onclick="login()" class="btn btn-success w-100">เข้าสู่ระบบ</button>
    <div id="loginErr" class="text-danger mt-2 text-center small"></div>
  </div>
</div>

<div id="mainApp" class="main-app">
  <nav class="navbar nav-custom p-3 shadow-sm">
    <div class="container-fluid">
      <span class="fw-bold">ระบบ Smart Saraban : <span id="userDisplay"></span></span>
      <button onclick="location.reload()" class="btn btn-sm btn-outline-light">ออก</button>
    </div>
  </nav>

  <div class="container mt-4">
    <div id="adminView" style="display:none;" class="card p-4 mb-4 shadow-sm border-0">
      <h5 class="text-success fw-bold">🚀 ส่งหนังสือราชการ</h5>
      <input type="file" id="fileInput" class="form-control mb-3">
      <button onclick="uploadToGithub()" id="uploadBtn" class="btn btn-primary w-100">ส่งเข้า GitHub</button>
    </div>

    <div class="card p-4 shadow-sm border-0">
      <h5 class="fw-bold mb-3">รายการหนังสือรับ</h5>
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr><th>วันที่</th><th>ชื่อไฟล์</th><th>จัดการ</th></tr>
          </thead>
          <tbody id="bookData"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // --- ตั้งค่าข้อมูล GitHub (ครูต้องมาแก้ตรงนี้ครับ) ---
  const GH_TOKEN = "ใส่รหัสTokenที่ครูก๊อปไว้ตรงนี้"; 
  const GH_OWNER = "ชื่อUsernameGithubของครู";
  const GH_REPO = "smart-saraban";

  let currentUser = {};

  // 1. ระบบ Login (อ่านไฟล์ users.csv จาก GitHub)
  async function login() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    
    const response = await fetch(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/users.csv`);
    const csvData = await response.text();
    const rows = csvData.split('\n');
    
    let found = rows.find(row => {
      const col = row.split(',');
      return col[0] === u && col[1] === p;
    });

    if(found) {
      const data = found.split(',');
      currentUser = { name: data[3], role: data[2] };
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      document.getElementById('userDisplay').innerText = currentUser.name;
      if(currentUser.role === 'Admin') document.getElementById('adminView').style.display = 'block';
      loadLogs();
    } else {
      document.getElementById('loginErr').innerText = "รหัสผิดครับครู";
    }
  }

  // 2. ระบบดึงรายการหนังสือ (อ่าน logs.csv)
  async function loadLogs() {
    const response = await fetch(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/logs.csv?t=${new Date().getTime()}`);
    const csvData = await response.text();
    const rows = csvData.split('\n').slice(1).reverse(); // เอาล่าสุดขึ้นก่อน
    
    const html = rows.map(row => {
      const col = row.split(',');
      if(!col[0]) return '';
      return `<tr>
        <td><small>${col[0]}</small></td>
        <td>${col[2]}</td>
        <td><a href="${col[4]}" target="_blank" class="btn btn-sm btn-outline-primary">เปิด</a></td>
      </tr>`;
    }).join('');
    document.getElementById('bookData').innerHTML = html;
  }

  // 3. ระบบส่งไฟล์เข้า GitHub (แทนการส่งเข้า Drive)
  async function uploadToGithub() {
    const file = document.getElementById('fileInput').files[0];
    if(!file) return alert("เลือกไฟล์ก่อนครับครู");
    
    const btn = document.getElementById('uploadBtn');
    btn.disabled = true; btn.innerText = "กำลังส่ง...";

    const reader = new FileReader();
    reader.onload = async (e) => {
      const content = e.target.result.split(',')[1]; // Base64
      const path = `uploads/${file.name}`;
      
      // อัปโหลดไฟล์เข้าโฟลเดอร์ uploads
      await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: `Add ${file.name}`, content: content })
      });

      // อัปเดตไฟล์ logs.csv
      await updateLogs(file.name, `https://${GH_OWNER}.github.io/${GH_REPO}/${path}`);
      
      alert("ส่งเรียบร้อย!");
      location.reload();
    };
    reader.readAsDataURL(file);
  }

  async function updateLogs(fileName, url) {
    const logRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/logs.csv`, {
      headers: { 'Authorization': `token ${GH_TOKEN}` }
    });
    const logData = await logRes.json();
    const oldContent = atob(logData.content);
    const newRow = `\n${new Date().toLocaleString('th-TH')},${currentUser.name},${fileName},Admin,${url}`;
    const newContent = btoa(unescape(encodeURIComponent(oldContent + newRow)));

    await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/logs.csv`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: "Update logs", content: newContent, sha: logData.sha })
    });
  }
</script>
</body>
</html>
