<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบสารบรรณ Hybrid - ศกศ.ตราด</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body { background: #f0f2f5; font-family: 'Sarabun', sans-serif; color: #1c1e21; }
    .nav-custom { background: linear-gradient(135deg, #004d40 0%, #00796b 100%); color: white; border-bottom: 3px solid #ffc107; }
    .card { border-radius: 15px; border: none; }
    .main-app { display: none; }
    .btn-primary { background-color: #00796b; border: none; }
    .btn-primary:hover { background-color: #004d40; }
    .table-responsive { border-radius: 10px; }
  </style>
</head>
<body>

<div id="loginPage" class="container mt-5" style="max-width: 400px;">
  <div class="card p-4 shadow-lg text-center">
    <h3 class="fw-bold text-success mb-4">Smart Saraban</h3>
    <input type="text" id="user" class="form-control mb-3" placeholder="ชื่อผู้ใช้">
    <input type="password" id="pass" class="form-control mb-3" placeholder="รหัสผ่าน">
    <button onclick="login()" class="btn btn-success w-100 py-2 fw-bold">เข้าสู่ระบบ</button>
    <div id="loginErr" class="text-danger mt-3 small"></div>
  </div>
</div>

<div id="mainApp" class="main-app">
  <nav class="navbar nav-custom p-3 shadow-sm sticky-top">
    <div class="container-fluid">
      <span class="fw-bold">👤 <span id="userDisplay"></span> | <span id="roleDisplay" class="badge bg-warning text-dark"></span></span>
      <button onclick="location.reload()" class="btn btn-sm btn-outline-light">ออกจากระบบ</button>
    </div>
  </nav>

  <div class="container mt-4">
    <div id="adminView" style="display:none;" class="card p-4 mb-4 shadow-sm border-start border-4 border-success">
      <h5 class="text-success fw-bold mb-3">🚀 ส่งหนังสือใหม่เข้า Google Drive</h5>
      <div class="row g-3">
        <div class="col-md-6">
          <select id="deptSelect" class="form-select">
             <option value="">-- เลือกกลุ่มงานปลายทาง --</option>
             <option>บริหารงานทั่วไป</option>
             <option>บริหารงานบุคคล</option>
             <option>บริหารงานวิชาการ</option>
             <option>บริหารแผนงานและงบประมาณ</option>
             <option>รองผู้อำนวยการ</option>
             <option>ผู้อำนวยการ</option>
          </select>
        </div>
        <div class="col-md-6">
          <input type="file" id="fileInput" class="form-control">
        </div>
        <div class="col-12">
          <button onclick="handleUpload()" id="uploadBtn" class="btn btn-primary w-100 fw-bold">อัปโหลดและบันทึกประวัติ</button>
        </div>
      </div>
    </div>

    <div class="card p-4 shadow-sm">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold m-0">รายการหนังสือรับ</h5>
        <button onclick="loadLogs()" class="btn btn-sm btn-light border">🔄 รีเฟรชข้อมูล</button>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle" style="font-size: 0.9rem;">
          <thead class="table-light">
            <tr>
              <th style="width: 20%;">วันที่</th>
              <th style="width: 60%;">ชื่อไฟล์ / ฝ่าย</th>
              <th style="width: 20%;">จัดการ</th>
            </tr>
          </thead>
          <tbody id="bookData"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // --- การตั้งค่า (ครูแก้ตรงนี้) ---
  const part1 = "ghp_"; 
  const part2 = "mpcrxscr5R9Y0vXZ3cZ4LtbvJjIktf0kXw1z"; 
  const GH_TOKEN = part1 + part2;
  const GH_OWNER = "specialtrat905";
  const GH_REPO = "smart-saraban";
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4Ckuc9I6SP9Ec3J6G2c43anbcn7AizrcoTBXrA7nhIE5F5_iDyb8-CE4932-e2NhYag/exec"; // URL ของ doGet/doPost

  let currentUser = {};

  // 1. ระบบ Login (ฉบับปรับปรุงการแยกบรรทัด)
  async function login() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value.trim();
    
    // ดึงข้อมูลจาก GitHub (ตรวจสอบ URL ให้ถูกต้อง)
    const response = await fetch(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/users.csv?t=${new Date().getTime()}`);
    const csvData = await response.text();
    
    // แก้ไข: ใช้ regex แยกบรรทัดเพื่อรองรับ \r\n จาก Windows
    const rows = csvData.split(/\r?\n/).filter(r => r.trim() !== "");
    
    let found = rows.find(row => {
      const col = row.split(',').map(i => i.trim());
      // col[0] คือชื่อผู้ใช้, col[1] คือรหัสผ่าน
      return col[0] === u && col[1] === p;
    });

    if(found) {
      const data = found.split(',').map(i => i.trim());
      currentUser = { user: data[0], role: data[2], name: data[3] };
      // แสดงหน้าแอปหลัก
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      document.getElementById('userDisplay').innerText = currentUser.name;
      document.getElementById('roleDisplay').innerText = currentUser.role;
      
      if(currentUser.role === 'Admin') document.getElementById('adminView').style.display = 'block';
      loadLogs();
    } else {
      document.getElementById('loginErr').innerText = "รหัสผิดครับครู! ตรวจสอบตัวพิมพ์เล็ก-ใหญ่ด้วยนะครับ";
    }
  }

  // 2. ระบบโหลดรายการ (อ่านจาก logs.csv ใน GitHub และกรองตามสิทธิ์)
  async function loadLogs() {
    const tableBody = document.getElementById('bookData');
    tableBody.innerHTML = '<tr><td colspan="3" class="text-center p-4">กำลังโหลดข้อมูล...</td></tr>';

    try {
      const response = await fetch(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/logs.csv?t=${new Date().getTime()}`);
      const csvData = await response.text();
      const rows = csvData.split('\n').filter(r => r.trim() !== "");
      
      // กรองข้อมูล: Admin เห็นหมด / User เห็นเฉพาะฝ่ายตัวเอง
      const dataRows = rows.slice(1).reverse().filter(row => {
        const col = row.split(',');
        if (currentUser.role === 'Admin') return true;
        return col[3].trim() === currentUser.role.trim();
      });

      if(dataRows.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="3" class="text-center p-4">ไม่พบข้อมูล</td></tr>';
        return;
      }

      tableBody.innerHTML = dataRows.map(row => {
        const col = row.split(',');
        return `<tr>
          <td style="font-size: 0.75rem; color: gray;">${col[0]}</td>
          <td style="word-break: break-all;">
             <span class="fw-bold text-dark">${col[2]}</span><br>
             <small class="badge bg-light text-muted border">${col[3]}</small>
          </td>
          <td><a href="${col[4]}" target="_blank" class="btn btn-sm btn-primary w-100">เปิดดู</a></td>
        </tr>`;
      }).join('');
    } catch(e) { tableBody.innerHTML = '<tr><td colspan="3">โหลดล้มเหลว</td></tr>'; }
  }

  // 3. ระบบส่งไฟล์ (ส่งไป Google Drive ผ่าน Apps Script)
  async function handleUpload() {
    const file = document.getElementById('fileInput').files[0];
    const dept = document.getElementById('deptSelect').value;
    if(!file || !dept) return alert("เลือกไฟล์และกลุ่มงานก่อนครับ");
    
    const btn = document.getElementById('uploadBtn');
    btn.disabled = true; btn.innerText = "1/2 กำลังส่งเข้า Google Drive...";

    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        // ส่งไฟล์ไป Google Apps Script
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            department: dept,
            sender: currentUser.name,
            fileName: file.name.replace(/,/g, ""),
            fileData: e.target.result
          })
        });
        const result = await res.json();
        
        if(result.success) {
          btn.innerText = "2/2 กำลังบันทึกลง GitHub...";
          await updateGithubLogs(result.fileName, dept, result.url);
          alert("ส่งหนังสือสำเร็จ!");
          document.getElementById('fileInput').value = "";
          loadLogs();
        } else { alert("Google Error: " + result.message); }
      } catch (err) { alert("เชื่อมต่อ Google ไม่ได้"); }
      finally { btn.disabled = false; btn.innerText = "อัปโหลดและบันทึกประวัติ"; }
    };
    reader.readAsDataURL(file);
  }

  // 4. บันทึกประวัติลง GitHub logs.csv (ผ่าน API)
  async function updateGithubLogs(fileName, dept, driveUrl) {
    const logRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/logs.csv`, {
      headers: { 'Authorization': `token ${GH_TOKEN}` }
    });
    const logJson = await logRes.json();
    const oldContent = decodeURIComponent(escape(atob(logJson.content)));
    const newRow = `\n${new Date().toLocaleString('th-TH')},${currentUser.name},${fileName},${dept},${driveUrl}`;
    const newContent = btoa(unescape(encodeURIComponent(oldContent + newRow)));

    await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/logs.csv`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: "Auto update logs", content: newContent, sha: logJson.sha })
    });
  }
</script>
</body>
</html>
