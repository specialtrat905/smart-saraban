<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบสารบรรณ ศกศ.ตราด (GitHub Version)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f7f6; font-family: 'Sarabun', sans-serif; }
    .login-container { max-width: 400px; margin: 60px auto; }
    .main-app { display: none; }
    .nav-custom { background: #004d40; color: white; }
  </style>
</head>
<body>

<div id="loginPage" class="container login-container">
  <div class="card p-4 shadow-sm border-0">
    <h4 class="text-center mb-4">เข้าสู่ระบบ (GitHub)</h4>
    <input type="text" id="user" class="form-control mb-3" placeholder="ชื่อผู้ใช้">
    <input type="password" id="pass" class="form-control mb-3" placeholder="รหัสผ่าน">
    <button onclick="login()" class="btn btn-success w-100">เข้าสู่ระบบ</button>
    <div id="loginErr" class="text-danger mt-2 text-center small"></div>
  </div>
</div>

<div id="mainApp" class="main-app">
  <nav class="navbar nav-custom p-3 shadow-sm">
    <div class="container-fluid">
      <span class="fw-bold">ระบบ Smart Saraban : <span id="userDisplay"></span></span>
      <button onclick="location.reload()" class="btn btn-sm btn-outline-light">ออกจากระบบ</button>
    </div>
  </nav>

  <div id="adminView" style="display:none;" class="card p-4 mb-4 shadow-sm border-0">
  <h5 class="text-success fw-bold">🚀 ส่งหนังสือราชการ (ไป Google Drive)</h5>
  
  <select id="deptSelect" class="form-select mb-3">
     <option value="">-- เลือกกลุ่มงานปลายทาง --</option>
     <option>บริหารงานทั่วไป</option>
     <option>บริหารงานบุคคล</option>
     <option>บริหารงานวิชาการ</option>
     <option>บริหารแผนงานและงบประมาณ</option>
     <option>รองผู้อำนวยการ</option>
     <option>ผู้อำนวยการ</option>
  </select>
  
  <input type="file" id="fileInput" class="form-control mb-3">
  <button onclick="uploadToGithub()" id="uploadBtn" class="btn btn-primary w-100">เริ่มส่งหนังสือ</button>
</div>

    <div class="card p-4 shadow-sm border-0">
      <h5 class="fw-bold mb-3">รายการหนังสือรับ</h5>
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr><th>วันที่</th><th>ชื่อไฟล์</th><th>จัดการ</th></tr>
          </thead>
          <tbody id="bookData"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // --- ตั้งค่าข้อมูล GitHub (ครูต้องมาแก้ตรงนี้ครับ) ---
  const part1 = "ghp_"; 
const part2 = "mpcrxscr5R9Y0vXZ3cZ4LtbvJjIktf0kXw1z"; // รหัสที่เหลือ
const GH_TOKEN = part1 + part2; 
  const GH_OWNER = "specialtrat905";
  const GH_REPO = "smart-saraban";

  let currentUser = {};

  // --- แก้ไขฟังก์ชัน login ใน index.html ---
async function login() {
  const u = document.getElementById('user').value.trim(); // ตัดช่องว่างจากช่องกรอก
  const p = document.getElementById('pass').value.trim(); // ตัดช่องว่างจากช่องกรอก
  
  const response = await fetch(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/users.csv?t=${new Date().getTime()}`);
  const csvData = await response.text();
  const rows = csvData.split('\n');
  
  let found = rows.find(row => {
    // แยกคอลัมน์และใช้ trim() กับทุกค่าในคอลัมน์
    const col = row.split(',').map(item => item.trim()); 
    return col[0] === u && col[1] === p;
  });

  if(found) {
    const data = found.split(',').map(item => item.trim());
    currentUser = { name: data[3], role: data[2] };
    // ... (ส่วนที่เหลือเหมือนเดิม) ...
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userDisplay').innerText = currentUser.name;
    if(currentUser.role === 'Admin') document.getElementById('adminView').style.display = 'block';
    loadLogs();
  } else {
    document.getElementById('loginErr').innerText = "รหัสผิดครับครู (เช็กตัวเล็กตัวใหญ่ด้วยนะครับ)";
  }
}

  // 2. ระบบดึงรายการหนังสือ (อ่าน logs.csv)
  async function loadLogs() {
  const tableBody = document.getElementById('bookData');
  tableBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">กำลังดึงข้อมูลล่าสุด...</td></tr>';

  try {
    // เพิ่ม Timestamp เพื่อป้องกัน Browser จำค่าเก่า (Cache)
    const response = await fetch(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/logs.csv?t=${new Date().getTime()}`);
    const csvData = await response.text();
    
    // แยกบรรทัดและตัดบรรทัดว่างทิ้ง
    const rows = csvData.split('\n').filter(row => row.trim() !== "");
    
    // ถ้ามีแค่หัวตาราง หรือไม่มีข้อมูลเลย
    if (rows.length <= 1) {
      tableBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">ไม่พบประวัติการส่งหนังสือ</td></tr>';
      return;
    }

    // ข้อมูลจริงเริ่มที่แถวที่ 2 (index 1) และเรียงจากใหม่ไปเก่า (reverse)
    const dataRows = rows.slice(1).reverse(); 

    const html = dataRows.map(row => {
      // ใช้ Regex ในการแยกคอลัมน์ เพื่อรองรับกรณีชื่อไฟล์มีเครื่องหมายคอมมา
      const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
      
      if(col.length < 5) return ''; // ข้ามถ้าคอลัมน์ไม่ครบ
      
      return `
        <tr>
          <td style="font-size: 0.8rem; color: #666;">${col[0]}</td>
          <td style="font-size: 0.9rem; font-weight: 500;">${col[2]}</td>
          <td>
            <button onclick="openDriveFile('${col[4]}')" class="btn btn-sm btn-outline-primary w-100">เปิดดู</button>
          </td>
        </tr>
      `;
    }).join('');

    tableBody.innerHTML = html;
  } catch (err) {
    console.error(err);
    tableBody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
  }
}

// เพิ่มฟังก์ชันเปิดไฟล์เพื่อให้รองรับลิ้งก์ Google Drive โดยตรง
function openDriveFile(url) {
  if (!url || url === "undefined") return alert("ไม่พบลิ้งก์ไฟล์ครับ");
  const win = window.open(url.trim(), '_blank');
  if (!win) {
    window.top.location.href = url.trim();
  }
}

  // 3. ระบบส่งไฟล์เข้า GitHub (แทนการส่งเข้า Drive)
  async function uploadToGithub() {
    const file = document.getElementById('fileInput').files[0];
    const dept = document.getElementById('deptSelect').value; // ดึงค่ากลุ่มงานที่ครูเลือก
    
    if(!file) return alert("กรุณาเลือกไฟล์ด้วยครับ");
    if(!dept) return alert("กรุณาเลือกกลุ่มงานปลายทางด้วยครับ"); // เช็กว่าเลือกกลุ่มงานหรือยัง
    
    const btn = document.getElementById('uploadBtn');
    btn.disabled = true; 
    btn.innerText = "กำลังส่งเข้า Google Drive...";

    const reader = new FileReader();
    reader.onload = async (e) => {
      const fileData = e.target.result;
      
      // ใส่ URL ของ Web App (Google Apps Script) ที่ครู Deploy ไว้
      const scriptUrl = "https://script.google.com/macros/s/AKfycbxHDkeUNc1mtOOJDM3_G8NRuEBT0oHU79twmgn7lo1bjtdXXxEVMkjGXmtyllDBJ9ix1Q/exec"; 
      
      try {
        const response = await fetch(scriptUrl, {
          method: 'POST',
          body: JSON.stringify({
            department: dept, // ส่งชื่อกลุ่มงานไปให้ AppScript
            sender: currentUser.name,
            fileName: file.name,
            fileData: fileData
          })
        });
        
        const result = await response.json();
        
        // --- แก้ไขเฉพาะช่วงท้ายของฟังก์ชัน uploadToGithub ---
        if(result.success) {
          // 1. บันทึกประวัติลง GitHub
          await updateLogs(result.fileName, result.url);
          
          alert("ส่งหนังสือเรียบร้อยแล้วครับ!");

          // 2. ล้างค่าในช่องกรอก (แทนการสั่ง reload)
          document.getElementById('fileInput').value = ""; // ล้างชื่อไฟล์ที่เลือกไว้
          document.getElementById('deptSelect').value = ""; // ล้างกลุ่มงานที่เลือกไว้
          
          // 3. สั่งโหลดตารางใหม่เพื่อให้เห็นรายการล่าสุดทันที
          loadLogs(); 

        } else {
          alert("เกิดข้อผิดพลาดจากฝั่ง Google: " + result.message);
        }
// --------------------------------------------------
      } catch (err) {
        alert("ไม่สามารถเชื่อมต่อกับ Google ได้ (เช็กการ Deploy ของครูอีกครั้งนะครับ)");
        console.error(err);
      } finally {
        btn.disabled = false; 
        btn.innerText = "เริ่มส่งหนังสือ";
      }
    };
    reader.readAsDataURL(file);
}

  async function updateLogs(fileName, url) {
    const logRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/logs.csv`, {
      headers: { 'Authorization': `token ${GH_TOKEN}` }
    });
    const logData = await logRes.json();
    const oldContent = atob(logData.content);
    const newRow = `\n${new Date().toLocaleString('th-TH')},${currentUser.name},${fileName},Admin,${url}`;
    const newContent = btoa(unescape(encodeURIComponent(oldContent + newRow)));

    await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/logs.csv`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: "Update logs", content: newContent, sha: logData.sha })
    });
  }
</script>
</body>
</html>
