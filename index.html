<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบสารบรรณ Hybrid - ศกศ.ตราด</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body { background: #f0f2f5; font-family: 'Sarabun', sans-serif; color: #1c1e21; }
    .nav-custom { background: linear-gradient(135deg, #004d40 0%, #00796b 100%); color: white; border-bottom: 3px solid #ffc107; }
    .card { border-radius: 15px; border: none; }
    .main-app { display: none; }
    .btn-primary { background-color: #00796b; border: none; }
    .btn-primary:hover { background-color: #004d40; }
    .table-responsive { border-radius: 10px; }
    .thai-wrap { word-break: normal; overflow-wrap: break-word; line-height: 1.5; text-align: left; }
    .file-item { transition: all 0.3s ease; border-left: 5px solid #00796b; }
    .file-item:hover { background-color: #f8f9fa; }
    .btn-remove { color: #dc3545; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
    .action-buttons { display: flex; gap: 5px; }
    .btn-copy { background-color: #ffffff; color: #00796b; border: 1px solid #00796b; }
    .btn-copy:hover { background-color: #e8f5e9; color: #004d40; }
    /* เพิ่มต่อท้ายในส่วน <style> */
    .row-missing { background-color: #ffeea8 !important; /* สีเหลืองนวลจางๆ */}
    .text-missing { color: #d93025; /* สีแดงเข้มแบบ Google เพื่อให้ดู Soft ลงแต่ยังเด่น */ font-weight: bold; }
  </style>
</head>
<body>

<div id="loginPage" class="container mt-5" style="max-width: 400px;">
  <div class="card p-4 shadow-lg text-center border-0">
    <h3 class="fw-bold text-success mb-4">Smart Saraban</h3>
    <input type="text" id="user" class="form-control mb-3" placeholder="ชื่อผู้ใช้">
    <input type="password" id="pass" class="form-control mb-3" placeholder="รหัสผ่าน">
    <button onclick="login()" class="btn btn-success w-100 py-2 fw-bold shadow-sm">เข้าสู่ระบบ</button>
    <div id="loginErr" class="text-danger mt-3 small"></div>
  </div>
</div>

<div id="mainApp" class="main-app">
  <nav class="navbar nav-custom p-3 shadow-sm sticky-top">
    <div class="container-fluid">
      <span class="fw-bold text-white">👤 <span id="userDisplay"></span> | <span id="roleDisplay" class="badge bg-warning text-dark"></span></span>
      <button id="logoutBtn" onclick="logout()" class="btn btn-sm btn-outline-light" style="display:none;">ออกจากระบบ</button>
    </div>
  </nav>

  <div class="container mt-4">
    <div id="adminView" style="display:none;" class="card p-4 mb-4 shadow-sm border-start border-4 border-success">
      <h5 class="text-success fw-bold mb-3">🚀 ส่งหนังสือใหม่</h5>
      <div class="row g-3">
        <div class="col-md-6">
          <select id="deptSelect" class="form-select">
             <option value="">-- เลือกกลุ่มงานปลายทาง --</option>
             <option>บริหารงานทั่วไป</option>
             <option>บริหารงานบุคคล</option>
             <option>บริหารงานวิชาการ</option>
             <option>บริหารแผนงานและงบประมาณ</option>
             <option>รองผู้อำนวยการ</option>
             <option>ผู้อำนวยการ</option>
             <option>อื่นๆ</option>
          </select>
        </div>
        <div class="col-md-6"><input type="file" id="fileInput" class="form-control" multiple></div>
        <div class="col-12">
          <div id="fileListContainer" class="mt-2" style="display:none;">
            <ul id="selectedFilesList" class="list-group mb-3"></ul>
          </div>
        </div>
        <div class="col-12">
          <button onclick="handleUpload()" id="uploadBtn" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">อัปโหลดหนังสือและแจ้งเตือน LINE</button>
        </div>
      </div>
    </div>
    <div class="card p-4 shadow-sm mb-5">
      <div class="row g-2 mb-3 align-items-center">
        <div class="col-12 col-md-2">
          <h5 class="fw-bold m-0 text-dark" style="font-size: 1.1rem;">รายการหนังสือรับ</h5>
        </div>

        <div class="col-6 col-md-2">
          <select id="yearSelect" class="form-select border-success shadow-sm" onchange="displayTable(allLogs)"></select>
        </div>

        <div class="col-6 col-md-3" id="deptFilterContainer" style="display:none;">
          <select id="deptFilter" class="form-select border-success shadow-sm" onchange="displayTable(allLogs)">
            <option value="all">🏢 ทุกกลุ่มงาน</option>
            <option>บริหารงานทั่วไป</option>
            <option>บริหารงานบุคคล</option>
            <option>บริหารงานวิชาการ</option>
            <option>บริหารแผนงานและงบประมาณ</option>
            <option>รองผู้อำนวยการ</option>
            <option>ผู้อำนวยการ</option>
            <option>อื่นๆ</option>
            <option>ยังไม่ได้ลงระบบ</option>
          </select>
        </div>

        <div class="col-12 col-md">
          <div class="input-group shadow-sm">
            <span class="input-group-text bg-white border-end-0">🔍</span>
            <input type="text" id="searchInput" class="form-control border-start-0" placeholder="พิมพ์ชื่อหนังสือเพื่อค้นหา..." onkeyup="filterTable()">
          </div>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle" style="font-size: 0.9rem;">
          <thead class="table-light">
            <tr class="text-center align-middle">
              <th style="width: 20%;">วันที่</th>
              <th style="width: 55%;">ชื่อหนังสือ / ฝ่าย</th>
              <th style="width: 25%;">จัดการ</th>
            </tr>
          </thead>
          <tbody id="bookData"></tbody>
        </table>
      </div>
    </div> </div> </div> 
<script>
  // --- การตั้งค่า ---
  const GH_OWNER = "specialtrat905";
  const GH_REPO = "smart-saraban";
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtbs4G9-d0Gxhunv96xcmsnmixnDwIbOTrr4xjSHIBewBVTDJU-NsUtGpMopH_mcnhJg/exec";

  let currentUser = {};
  let allLogs = [];
  let selectedFilesArray = [];
  let currentYearBE = new Date().getFullYear() + 543;

  // เพิ่มไว้ด้านบนของส่วน <script>
function checkSession() {
    const savedUser = localStorage.getItem('sarabanUser');
    const loginTime = localStorage.getItem('loginTime');
    
    if (savedUser && loginTime) {
        const now = new Date().getTime();
        const twoHours = 2 * 60 * 60 * 1000; // 2 ชั่วโมง
        
        if (now - loginTime < twoHours) {
            // ✅ กรณีที่ยังไม่หมดเวลา 2 ชม. ให้ล็อกอินอัตโนมัติ
            currentUser = JSON.parse(savedUser);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userDisplay').innerText = currentUser.name;
            document.getElementById('roleDisplay').innerText = currentUser.role;

            // --- ส่วนที่ต้องเน้น: เช็คสิทธิ์เพื่อโชว์/ซ่อนปุ่ม ตอนรีเฟรชหน้าจอ ---
            if(currentUser.role === 'Admin') {
                document.getElementById('logoutBtn').style.display = 'block'; // โชว์ปุ่มถ้าเป็น Admin
                document.getElementById('adminView').style.display = 'block';
                document.getElementById('deptFilterContainer').style.display = 'block';
            } else {
                document.getElementById('logoutBtn').style.display = 'none';  // ซ่อนปุ่มถ้าเป็นกลุ่มงาน
            }
            // ---------------------------------------------------------

            loadLogs(); 
        } else {
            // ❌ ถ้าเกิน 2 ชม. แล้ว ให้เตะออกไปหน้าล็อกอิน
            logout();
        }
    }
}

function logout() {
    localStorage.removeItem('sarabanUser');
    localStorage.removeItem('loginTime');
    location.reload();
}

  // --- 1. จัดการไฟล์อัปโหลด ---
  document.getElementById('fileInput').addEventListener('change', function(e) {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      if (!selectedFilesArray.some(f => f.name === file.name)) selectedFilesArray.push(file);
    });
    renderFileList();
    this.value = "";
  });

  function renderFileList() {
    const listElement = document.getElementById('selectedFilesList');
    document.getElementById('fileListContainer').style.display = selectedFilesArray.length > 0 ? 'block' : 'none';
    listElement.innerHTML = selectedFilesArray.map((file, index) => `
      <li class="list-group-item d-flex justify-content-between align-items-center file-item py-2">
        <div class="text-truncate" style="max-width: 85%; font-size:0.8rem;">
          <span class="badge bg-success me-2">${index + 1}</span>${file.name}
        </div>
        <span class="btn-remove" onclick="removeFile(${index})">✕ ลบ</span>
      </li>`).join('');
  }

  function removeFile(index) { selectedFilesArray.splice(index, 1); renderFileList(); }

  function copyLink(url) {
    navigator.clipboard.writeText(url).then(() => alert("✅ คัดลอกแล้ว!")).catch(() => {
      const t = document.createElement("textarea"); t.value = url; document.body.appendChild(t); t.select();
      document.execCommand("copy"); document.body.removeChild(t); alert("✅ คัดลอกแล้ว!");
    });
  }

  // --- 2. ระบบกรองปี (ปรับปรุงใหม่ตามที่คุยกัน) ---
  function updateYearOptions(logs) {
    const yearSelect = document.getElementById('yearSelect');
    
    // ดึงปีจากเลขที่หนังสือเท่านั้น (รูปแบบ เลขที่-ปี)
    let years = [...new Set(logs.map(col => {
      const match = col[2].match(/^(\d+)-(\d{4})/); 
      return match ? match[2] : null;
    }))].filter(y => y !== null).sort((a, b) => b - a);

    if (!years.includes(currentYearBE.toString())) years.unshift(currentYearBE.toString());

    // เพิ่มตัวเลือก "📂 ดูทั้งหมด (ทุกปี)"
    let options = `<option value="all">📂 ดูทั้งหมด (ทุกปี)</option>`;
    options += years.map(y => `<option value="${y}">ปี พ.ศ. ${y}</option>`).join('');
    
    yearSelect.innerHTML = options;

    // เงื่อนไขการเลือกค่าเริ่มต้น
    if (currentUser.role === 'Admin') {
      yearSelect.value = "all"; // Admin เห็นทั้งหมด
    } else {
      yearSelect.value = currentYearBE.toString(); // กลุ่มงานเห็นปีปัจจุบัน
    }
  }

  // --- 3. แสดงผลตาราง (ปรับปรุงการกรองปีและจัดกลุ่ม) ---
  function displayTable(dataRows) {
    const tableBody = document.getElementById('bookData');
    const selectedYear = document.getElementById('yearSelect').value;
    const selectedDept = document.getElementById('deptFilter').value; 
    const searchTerm = document.getElementById('searchInput').value.trim();
    const isSearching = searchTerm !== ""; 

    // --- 1. กำหนดสีกรอบตามกลุ่มงาน ---
    const deptColors = {
        "บริหารงานวิชาการ": "#ffde59",
        "บริหารแผนงานและงบประมาณ": "#ff5757",
        "บริหารงานบุคคล": "#0cc0df",
        "บริหารงานทั่วไป": "#8c52ff",
        "ผู้อำนวยการ": "#add8e6",     // น้ำเงินอ่อน
        "รองผู้อำนวยการ": "#d2b48c",   // น้ำตาลอ่อน
        "อื่นๆ": "#adb5bd"           // เทา
    };

    // 2. กรองข้อมูลที่มีในระบบ
    let filtered = dataRows.filter(col => {
      if (!col || col.length < 5) return false;
      const isUserAdmin = currentUser.role === 'Admin';
      const matchRole = isUserAdmin || (col[3].trim() === currentUser.role.trim());
      let matchYear = (selectedYear === "all") || (col[2].match(/^(\d+)-(\d{4})/)?.[2] === selectedYear);
      let matchDept = false;
      if (selectedDept === "all") { matchDept = true; }
      else if (selectedDept === "ยังไม่ได้ลงระบบ") { matchDept = false; }
      else { matchDept = (col[3].trim() === selectedDept); }
      return matchRole && matchYear && matchDept;
    });

    if (currentUser.role === 'Admin') {
      const groupedData = {};
      filtered.forEach(col => {
        const fileName = col[2];
        if (!groupedData[fileName]) {
          groupedData[fileName] = { date: col[0], fileName: col[2], departments: [col[3].trim()], url: col[4] };
        } else if (!groupedData[fileName].departments.includes(col[3].trim())) {
          groupedData[fileName].departments.push(col[3].trim());
        }
      });
      filtered = Object.values(groupedData).map(item => [item.date, "", item.fileName, item.departments.join(", "), item.url]);
    }

    // 3. เรียงลำดับข้อมูลที่มีอยู่ (ใหม่ไปเก่า)
    filtered.sort((a, b) => {
      const matchA = a[2].match(/^(\d+)-(\d+)/), matchB = b[2].match(/^(\d+)-(\d+)/);
      if (matchA && matchB) return (parseInt(matchB[2]) - parseInt(matchA[2])) || (parseInt(matchB[1]) - parseInt(matchA[1]));
      return b[0].localeCompare(a[0]);
    });

    // ✨ 4. ส่วนตรวจหาเลขที่หายไป: ปรับให้เรียงจาก ใหม่ไปเก่า (เลขมากไปน้อย)
    if (currentUser.role === 'Admin' && (selectedYear === "2569" || selectedYear === "all") && !isSearching) {
      if (selectedDept === "all" || selectedDept === "ยังไม่ได้ลงระบบ") {
        const missingRows = [];
        const existingNumbers = dataRows.map(col => {
            const m = col[2].match(/^(\d+)-2569/);
            return m ? parseInt(m[1]) : null;
        }).filter(n => n !== null);

        if (existingNumbers.length > 0) {
            const maxNum = Math.max(...existingNumbers);
            // เปลี่ยนเป็นถอยหลัง: จากเลขมาก (ใหม่) ไปหาเลขน้อย (เก่า)
            for (let i = maxNum; i >= 1; i--) {
                if (!existingNumbers.includes(i)) {
                    missingRows.push([
                        "❌", 
                        "SYSTEM", 
                        `${i}-2569 <span style="color: red; font-weight: bold;">[ยังไม่ได้ลงระบบ]</span>`, 
                        "ยังไม่มีข้อมูล", 
                        "#"
                    ]);
                }
            }
        }
        filtered = filtered.concat(missingRows);
      }
    }

    if(filtered.length === 0) {
      tableBody.innerHTML = '<tr><td colspan="3" class="text-center p-4 text-muted">ไม่พบข้อมูล</td></tr>';
      return;
    }

    // 5. แสดงผลตาราง
    tableBody.innerHTML = filtered.map(col => {
      const isMissing = col[0] === "❌";
      
      // ✨ ปรับแต่ง Badge สีตามกลุ่มงาน
      const deptBadges = isMissing ? "" : col[3].split(', ').map(d => {
        const color = deptColors[d.trim()] || "#adb5bd"; // ถ้าไม่ตรงกลุ่มให้ใช้สีเทา
        return `<small class="badge border me-1" style="font-size: 0.7rem; background-color: ${color}; color: #000; border-color: rgba(0,0,0,0.1) !important;">${d}</small>`;
      }).join('');
      
      return `
      <tr class="${isMissing ? 'row-missing' : ''} align-middle">
        <td class="text-center" style="font-size: ${isMissing ? '1.1rem' : '0.75rem'}; color: ${isMissing ? '#ff4d4d' : 'gray'};">${col[0]}</td>
        <td class="thai-wrap text-start"> <span class="${isMissing ? '' : 'text-dark'} d-block mb-1" style="font-size: 0.85rem;">${col[2]}</span>
           <div class="d-flex justify-content-start flex-wrap">${deptBadges}</div> </td>
        <td class="text-center">
          <div class="action-buttons justify-content-center">
            ${isMissing ? 
                '<button class="btn btn-sm btn-outline-danger w-100" disabled style="font-size: 0.75rem;">ตามหนังสือฉบับนี้</button>' : 
                `<a href="${col[4]}" target="_blank" class="btn btn-sm btn-primary shadow-sm flex-grow-1">เปิดดู</a>
                 <button onclick="copyLink('${col[4]}')" class="btn btn-sm btn-copy shadow-sm">คัดลอก</button>`
            }
          </div>
        </td>
      </tr>`;
    }).join('');
}

  // --- 4. ระบบหลังบ้าน ---
  async function login() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value.trim();
    try {
      const response = await fetch(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/users.csv?t=${new Date().getTime()}`);
      const csvData = await response.text();
      const rows = csvData.split(/\r?\n/).filter(r => r.trim() !== "");
      let found = rows.find(row => {
        const col = row.split(',').map(i => i.trim());
        return col[0] === u && col[1] === p;
      });

      if(found) {
        const data = found.split(',').map(i => i.trim());
        currentUser = { user: data[0], role: data[2], name: data[3] };
    // 1. สั่งให้เครื่องจำชื่อผู้ใช้และเวลาที่ล็อกอิน (เอาไว้เช็ก 2 ชม.)
        localStorage.setItem('sarabanUser', JSON.stringify(currentUser));
        localStorage.setItem('loginTime', new Date().getTime());

    // 2. เช็กสิทธิ์: ถ้าเป็น Admin ให้โชว์ปุ่มออกจากระบบ
    if (currentUser.role === 'Admin') {
        document.getElementById('logoutBtn').style.display = 'block'; // ดึงม่านออก (โชว์ปุ่ม)
        document.getElementById('adminView').style.display = 'block';
        document.getElementById('deptFilterContainer').style.display = 'block';
    } else {
        document.getElementById('logoutBtn').style.display = 'none';  // ปิดม่านไว้ (ซ่อนปุ่ม)
    }
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userDisplay').innerText = currentUser.name;
        document.getElementById('roleDisplay').innerText = currentUser.role;
        if(currentUser.role === 'Admin') {
          document.getElementById('adminView').style.display = 'block';
          document.getElementById('deptFilterContainer').style.display = 'block';
        }
        loadLogs();
      } else { document.getElementById('loginErr').innerText = "รหัสผ่านไม่ถูกต้อง"; }
    } catch(e) { alert("เชื่อมต่อฐานข้อมูลไม่ได้"); }
  }

  async function loadLogs() {
    const tableBody = document.getElementById('bookData');
    tableBody.innerHTML = '<tr><td colspan="3" class="text-center p-4">กำลังโหลดข้อมูล...</td></tr>';
    try {
      // เปลี่ยนมาดึงจาก SCRIPT_URL (ซึ่งจะไปเรียก doGet ใน Apps Script)
      const response = await fetch(`${SCRIPT_URL}?t=${new Date().getTime()}`);
      allLogs = await response.json(); // ข้อมูลจากชีตจะเป็น Array มาให้เลย
      
      updateYearOptions(allLogs);
      displayTable(allLogs);
    } catch(e) { 
      console.error("Load Error:", e);
      tableBody.innerHTML = '<tr><td colspan="3">โหลดข้อมูลไม่สำเร็จ</td></tr>'; 
    }
  }

  function filterTable() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const filteredData = allLogs.filter(col => col[2].toLowerCase().includes(searchTerm));
    displayTable(filteredData);
  }

  async function handleUpload() {
    const dept = document.getElementById('deptSelect').value;
    if (selectedFilesArray.length === 0 || !dept) return alert("เลือกไฟล์และกลุ่มงานปลายทาง");
    const btn = document.getElementById('uploadBtn'); btn.disabled = true;
    let uploadedFiles = []; 

    for (let file of selectedFilesArray) {
        btn.innerText = `กำลังส่ง: ${file.name.substring(0,10)}...`;
        try {
            const fileData = await new Promise(resolve => { const r = new FileReader(); r.onload = e => resolve(e.target.result); r.readAsDataURL(file); });
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ department: dept, sender: currentUser.name, fileName: file.name.replace(/,/g, ""), fileData: fileData }) });
            const result = await res.json();
            if (result.success) {
                uploadedFiles.push({ name: result.fileName, url: result.url });
            }
        } catch (err) { console.error(err); }
    }

    if (uploadedFiles.length > 0) {
        btn.innerText = "กำลังแจ้งเตือน LINE...";
        try {
            const lineRes = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "sendBatchNotification", 
                    department: dept,
                    sender: currentUser.name, 
                    fileList: uploadedFiles
                })
            });
            const lineResult = await lineRes.json();
            if (lineResult.message && lineResult.message.includes("failed")) {
                alert("⚠️ ไฟล์อัปโหลดสำเร็จ แต่แจ้งเตือน LINE ผิดพลาด: " + lineResult.message);
            }
        } catch (err) { 
            console.error(err);
            alert("❌ ระบบแจ้งเตือน LINE ขัดข้อง (ตรวจสอบ Token หรือการเชื่อมต่อ)");
        }
    }
    alert(`สำเร็จ! ส่งหนังสือ ${uploadedFiles.length} ฉบับ เรียบร้อย`);
    selectedFilesArray = []; renderFileList(); btn.disabled = false; btn.innerText = "อัปโหลดหนังสือและแจ้งเตือน LINE";
    loadLogs();
  }
  window.addEventListener('load', () => {
    checkSession();
    const p = new URLSearchParams(window.location.search);
    if (p.get('u') && p.get('p')) {
      document.getElementById('user').value = p.get('u');
      document.getElementById('pass').value = p.get('p');
      setTimeout(login, 500);
    }
  });
</script>
</body>
</html>
