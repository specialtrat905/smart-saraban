<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบสารบรรณ Hybrid - ศกศ.ตราด</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body { background: #f0f2f5; font-family: 'Sarabun', sans-serif; color: #1c1e21; }
    .nav-custom { background: linear-gradient(135deg, #004d40 0%, #00796b 100%); color: white; border-bottom: 3px solid #ffc107; }
    .card { border-radius: 15px; border: none; }
    .main-app { display: none; }
    .btn-primary { background-color: #00796b; border: none; }
    .btn-primary:hover { background-color: #004d40; }
    .table-responsive { border-radius: 10px; }
    .thai-wrap { word-break: normal; overflow-wrap: break-word; line-height: 1.5; text-align: left; }
    .file-item { transition: all 0.3s ease; border-left: 5px solid #00796b; }
    .file-item:hover { background-color: #f8f9fa; }
    .btn-remove { color: #dc3545; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
    .action-buttons { display: flex; gap: 5px; }
    .btn-copy { background-color: #ffffff; color: #00796b; border: 1px solid #00796b; }
    .btn-copy:hover { background-color: #e8f5e9; color: #004d40; }
  </style>
</head>
<body>

<div id="loginPage" class="container mt-5" style="max-width: 400px;">
  <div class="card p-4 shadow-lg text-center border-0">
    <h3 class="fw-bold text-success mb-4">Smart Saraban</h3>
    <input type="text" id="user" class="form-control mb-3" placeholder="ชื่อผู้ใช้">
    <input type="password" id="pass" class="form-control mb-3" placeholder="รหัสผ่าน">
    <button onclick="login()" class="btn btn-success w-100 py-2 fw-bold shadow-sm">เข้าสู่ระบบ</button>
    <div id="loginErr" class="text-danger mt-3 small"></div>
  </div>
</div>

<div id="mainApp" class="main-app">
  <nav class="navbar nav-custom p-3 shadow-sm sticky-top">
    <div class="container-fluid">
      <span class="fw-bold text-white">👤 <span id="userDisplay"></span> | <span id="roleDisplay" class="badge bg-warning text-dark"></span></span>
      <button onclick="location.reload()" class="btn btn-sm btn-outline-light">ออกจากระบบ</button>
    </div>
  </nav>

  <div class="container mt-4">
    <div id="adminView" style="display:none;" class="card p-4 mb-4 shadow-sm border-start border-4 border-success">
      <h5 class="text-success fw-bold mb-3">🚀 ส่งหนังสือใหม่</h5>
      <div class="row g-3">
        <div class="col-md-6">
          <select id="deptSelect" class="form-select">
             <option value="">-- เลือกกลุ่มงานปลายทาง --</option>
             <option>บริหารงานทั่วไป</option>
             <option>บริหารงานบุคคล</option>
             <option>บริหารงานวิชาการ</option>
             <option>บริหารแผนงานและงบประมาณ</option>
             <option>รองผู้อำนวยการ</option>
             <option>ผู้อำนวยการ</option>
          </select>
        </div>
        <div class="col-md-6"><input type="file" id="fileInput" class="form-control" multiple></div>
        <div class="col-12">
          <div id="fileListContainer" class="mt-2" style="display:none;">
            <p class="small fw-bold mb-2 text-secondary">รายการไฟล์ที่เตรียมส่ง:</p>
            <ul id="selectedFilesList" class="list-group mb-3"></ul>
          </div>
        </div>
        <div class="col-12">
          <button onclick="handleUpload()" id="uploadBtn" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">อัปโหลดหนังสือและแจ้งเตือน LINE</button>
        </div>
      </div>
    </div>

    <div class="card p-4 shadow-sm mb-5">
      <div class="row mb-3 align-items-center">
        <div class="col-md-3"><h5 class="fw-bold m-0 text-dark">รายการหนังสือรับ</h5></div>
        
        <div class="col-md-3 mt-2 mt-md-0">
          <select id="yearSelect" class="form-select border-success shadow-sm" onchange="displayTable(allLogs)">
            </select>
        </div>

        <div class="col-md-6 mt-2 mt-md-0">
          <div class="input-group shadow-sm">
            <span class="input-group-text bg-white border-end-0">🔍</span>
            <input type="text" id="searchInput" class="form-control border-start-0" placeholder="พิมพ์ชื่อหนังสือเพื่อค้นหา..." onkeyup="filterTable()">
          </div>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle" style="font-size: 0.9rem;">
          <thead class="table-light">
            <tr>
              <th style="width: 20%;">วันที่</th>
              <th style="width: 55%;">ชื่อหนังสือ / ฝ่าย</th>
              <th style="width: 25%;">จัดการ</th>
            </tr>
          </thead>
          <tbody id="bookData"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // --- การตั้งค่า (Configuration) ---
  const GH_OWNER = "specialtrat905";
  const GH_REPO = "smart-saraban";
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtbs4G9-d0Gxhunv96xcmsnmixnDwIbOTrr4xjSHIBewBVTDJU-NsUtGpMopH_mcnhJg/exec";
  const part1 = "ghp_"; 
  const part2 = "mpcrxscr5R9Y0vXZ3cZ4LtbvJjIktf0kXw1z"; 
  const GH_TOKEN = part1 + part2;

  let currentUser = {};
  let allLogs = [];
  let selectedFilesArray = [];
  let currentYearBE = new Date().getFullYear() + 543; // ปี พ.ศ. ปัจจุบัน

  // --- 1. ระบบจัดการไฟล์ (File Management) ---
  document.getElementById('fileInput').addEventListener('change', function(e) {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      if (!selectedFilesArray.some(f => f.name === file.name && f.size === file.size)) {
        selectedFilesArray.push(file);
      }
    });
    renderFileList();
    this.value = "";
  });

  function renderFileList() {
    const container = document.getElementById('fileListContainer');
    const listElement = document.getElementById('selectedFilesList');
    container.style.display = selectedFilesArray.length > 0 ? 'block' : 'none';
    listElement.innerHTML = selectedFilesArray.map((file, index) => `
      <li class="list-group-item d-flex justify-content-between align-items-center file-item py-2">
        <div class="text-truncate" style="max-width: 80%;">
          <span class="badge bg-success me-2">${index + 1}</span>
          <span class="small">${file.name}</span>
        </div>
        <span class="btn-remove" onclick="removeFile(${index})">✕ ลบ</span>
      </li>`).join('');
  }

  function removeFile(index) {
    selectedFilesArray.splice(index, 1);
    renderFileList();
  }

  function copyLink(url) {
    navigator.clipboard.writeText(url).then(() => alert("✅ คัดลอกลิ้งค์เรียบร้อย!")).catch(() => {
      const t = document.createElement("textarea"); t.value = url; document.body.appendChild(t); t.select();
      document.execCommand("copy"); document.body.removeChild(t); alert("✅ คัดลอกลิ้งค์เรียบร้อย!");
    });
  }

  // --- 2. ระบบจัดการปี (Year Management) ---
  function updateYearOptions(logs) {
    const yearSelect = document.getElementById('yearSelect');
    // ดึงปีจากชื่อไฟล์ (แพทเทิร์น -25XX)
    let years = [...new Set(logs.map(col => {
      const match = col[2].match(/-(\d{4})/);
      return match ? match[1] : null;
    }))].filter(y => y !== null).sort((a, b) => b - a);

    // ถ้าไม่มีข้อมูลปีปัจจุบันใน log ให้เพิ่มเข้าไปเป็นตัวเลือก
    if (!years.includes(currentYearBE.toString())) years.unshift(currentYearBE.toString());

    yearSelect.innerHTML = years.map(y => `<option value="${y}" ${y == currentYearBE ? 'selected' : ''}>ปี พ.ศ. ${y}</option>`).join('');
  }

  // --- 3. ระบบแสดงผลและค้นหา (Table & Filter) ---
  function displayTable(dataRows) {
    const tableBody = document.getElementById('bookData');
    const selectedYear = document.getElementById('yearSelect').value || currentYearBE;

    let filtered = dataRows.filter(col => {
      // ตรวจสอบว่ามีข้อมูลคอลัมน์ครบไหมก่อนทำอย่างอื่น
      if (!col || col.length < 4) return false; 
      
      const matchRole = (currentUser.role === 'Admin') || (col[3] && col[3].trim() === currentUser.role.trim());
      const matchYear = col[2] && col[2].includes("-" + selectedYear);
      return matchRole && matchYear;
    });

    // แก้ไขการเรียงลำดับ (Sorting) ให้ถูกต้อง
    filtered.sort((a, b) => {
      const matchA = a[2] ? a[2].match(/^(\d+)-(\d+)/) : null;
      const matchB = b[2] ? b[2].match(/^(\d+)-(\d+)/) : null;
      
      if (matchA && matchB) {
        // ถ้าปีต่างกัน เอาปีเยอะขึ้นก่อน
        if (matchB[2] !== matchA[2]) return parseInt(matchB[2]) - parseInt(matchA[2]);
        // ถ้าปีเดียวกัน เอาเลขเล่มเยอะขึ้นก่อน
        return parseInt(matchB[1]) - parseInt(matchA[1]);
      }
      return b[0].localeCompare(a[0]);
    });

    if(filtered.length === 0) {
      tableBody.innerHTML = '<tr><td colspan="3" class="text-center p-4 text-muted">ไม่พบข้อมูลในปีที่เลือก</td></tr>';
      return;
    }

    tableBody.innerHTML = filtered.map(col => `
      <tr>
        <td style="font-size: 0.75rem; color: gray;">${col[0]}</td>
        <td class="thai-wrap">
           <span class="fw-bold text-dark" style="font-size: 0.85rem;">${col[2]}</span><br>
           <small class="badge bg-light text-muted border" style="font-size: 0.7rem;">${col[3]}</small>
        </td>
        <td>
          <div class="action-buttons">
            <a href="${col[4]}" target="_blank" class="btn btn-sm btn-primary shadow-sm flex-grow-1">เปิดดู</a>
            <button onclick="copyLink('${col[4]}')" class="btn btn-sm btn-copy shadow-sm">คัดลอก</button>
          </div>
        </td>
      </tr>`).join('');
  }

  function filterTable() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const filteredData = allLogs.filter(col => col[2].toLowerCase().includes(searchTerm));
    displayTable(filteredData);
  }

  // --- 4. ระบบหลัก (Auth & Load) ---
  async function login() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value.trim();
    try {
      const response = await fetch(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/users.csv?t=${new Date().getTime()}`);
      const csvData = await response.text();
      const rows = csvData.split(/\r?\n/).filter(r => r.trim() !== "");
      let found = rows.find(row => {
        const col = row.split(',').map(i => i.trim());
        return col[0] === u && col[1] === p;
      });

      if(found) {
        const data = found.split(',').map(i => i.trim());
        currentUser = { user: data[0], role: data[2], name: data[3] };
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userDisplay').innerText = currentUser.name;
        document.getElementById('roleDisplay').innerText = currentUser.role;
        if(currentUser.role === 'Admin') document.getElementById('adminView').style.display = 'block';
        loadLogs();
      } else { document.getElementById('loginErr').innerText = "รหัสผ่านไม่ถูกต้อง"; }
    } catch(e) { alert("เชื่อมต่อฐานข้อมูลไม่ได้"); }
  }

  async function loadLogs() {
    const tableBody = document.getElementById('bookData');
    tableBody.innerHTML = '<tr><td colspan="3" class="text-center p-4">กำลังโหลดข้อมูล...</td></tr>';
    try {
      const response = await fetch(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/logs.csv?t=${new Date().getTime()}`);
      const csvData = await response.text();
      const rows = csvData.split(/\r?\n/).filter(r => r.trim() !== "");
      
      // เปลี่ยนวิธี split เป็น regex เพื่อรองรับคอมม่าในเครื่องหมายคำพูด ""
      allLogs = rows.slice(1).map(row => {
        return row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(val => val.replace(/"/g, "").trim());
      });
      
      updateYearOptions(allLogs);
      displayTable(allLogs);
    } catch(e) { 
      console.error(e);
      tableBody.innerHTML = '<tr><td colspan="3" class="text-center p-4">โหลดข้อมูลไม่สำเร็จ (ตรวจสอบรูปแบบ CSV)</td></tr>'; 
    }
  }

  async function handleUpload() {
    const dept = document.getElementById('deptSelect').value;
    if (selectedFilesArray.length === 0 || !dept) return alert("กรุณาเลือกไฟล์และกลุ่มงานปลายทาง");
    const btn = document.getElementById('uploadBtn'); btn.disabled = true;
    let uploadedFiles = []; 

    for (let i = 0; i < selectedFilesArray.length; i++) {
        const file = selectedFilesArray[i];
        btn.innerText = `กำลังส่ง (${i + 1}/${selectedFilesArray.length})...`;
        try {
            const reader = new FileReader();
            const fileData = await new Promise(resolve => { reader.onload = e => resolve(e.target.result); reader.readAsDataURL(file); });
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ department: dept, sender: currentUser.name, fileName: file.name.replace(/,/g, ""), fileData: fileData }) });
            const result = await res.json();
            if (result.success) {
                await updateGithubLogs(result.fileName, dept, result.url);
                uploadedFiles.push({ name: result.fileName, url: result.url });
            }
        } catch (err) { console.error(err); }
    }

    if (uploadedFiles.length > 0) {
      await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "sendBatchNotification", department: dept, sender: currentUser.name, fileList: uploadedFiles }) });
    }

    alert(`สำเร็จ! ส่งหนังสือ ${uploadedFiles.length} ฉบับ เรียบร้อยครับ`);
    selectedFilesArray = []; renderFileList(); btn.disabled = false; btn.innerText = "อัปโหลดหนังสือและแจ้งเตือน LINE";
    loadLogs();
  }

  async function updateGithubLogs(fileName, dept, driveUrl) {
    const logRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/logs.csv`, { headers: { 'Authorization': `token ${GH_TOKEN}` } });
    const logJson = await logRes.json();
    const oldContent = decodeURIComponent(escape(atob(logJson.content)));
    const newRow = `\n${new Date().toLocaleString('th-TH')},${currentUser.name},${fileName},${dept},${driveUrl}`;
    const newContent = btoa(unescape(encodeURIComponent(oldContent + newRow)));
    await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/logs.csv`, { method: 'PUT', headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: "Update logs", content: newContent, sha: logJson.sha }) });
  }

  // --- Auto Login จากลิ้งค์ LINE ---
  window.addEventListener('load', async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const u = urlParams.get('u'); const p = urlParams.get('p');
    if (u && p) {
      setTimeout(async () => {
        document.getElementById('user').value = u;
        document.getElementById('pass').value = p;
        await login();
      }, 300);
    }
  });
</script>
</body>
</html>
