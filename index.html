<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบสารบรรณ Hybrid - ศกศ.ตราด</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body { background: #f0f2f5; font-family: 'Sarabun', sans-serif; color: #1c1e21; }
    .nav-custom { background: linear-gradient(135deg, #004d40 0%, #00796b 100%); color: white; border-bottom: 3px solid #ffc107; }
    .card { border-radius: 15px; border: none; }
    .main-app { display: none; }
    .btn-primary { background-color: #00796b; border: none; }
    .btn-primary:hover { background-color: #004d40; }
    .table-responsive { border-radius: 10px; }
    .thai-wrap { word-break: normal; overflow-wrap: break-word; line-height: 1.5; text-align: left; }
    .file-item { transition: all 0.3s ease; border-left: 5px solid #00796b; }
    .file-item:hover { background-color: #f8f9fa; }
    .btn-remove { color: #dc3545; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
    .action-buttons { display: flex; gap: 5px; }
    .btn-copy { background-color: #ffffff; color: #00796b; border: 1px solid #00796b; }
    .btn-copy:hover { background-color: #e8f5e9; color: #004d40; }
    /* เพิ่มต่อท้ายในส่วน <style> */
    .row-missing { background-color: #ffeea8 !important; /* สีเหลืองนวลจางๆ */}
    .text-missing { color: #d93025; /* สีแดงเข้มแบบ Google เพื่อให้ดู Soft ลงแต่ยังเด่น */ font-weight: bold; }
  </style>
</head>
<body>

<div id="loginPage" class="container mt-5" style="max-width: 400px;">
  <div class="card p-4 shadow-lg text-center border-0">
    <h3 class="fw-bold text-success mb-4">Smart Saraban</h3>
    <input type="text" id="user" class="form-control mb-3" placeholder="ชื่อผู้ใช้">
    <input type="password" id="pass" class="form-control mb-3" placeholder="รหัสผ่าน">
    <button onclick="login()" class="btn btn-success w-100 py-2 fw-bold shadow-sm">เข้าสู่ระบบ</button>
    <div id="loginErr" class="text-danger mt-3 small"></div>
  </div>
</div>

<div id="mainApp" class="main-app">
  <nav class="navbar nav-custom p-3 shadow-sm sticky-top">
    <div class="container-fluid">
      <span class="fw-bold text-white">👤 <span id="userDisplay"></span> | <span id="roleDisplay" class="badge bg-warning text-dark"></span></span>
      <button id="logoutBtn" onclick="logout()" class="btn btn-sm btn-outline-light" style="display:none;">ออกจากระบบ</button>
    </div>
  </nav>

  <div class="container mt-4">
    <div id="adminView" style="display:none;" class="card p-4 mb-4 shadow-sm border-start border-4 border-success">
      <h5 class="text-success fw-bold mb-3">🚀 ส่งหนังสือใหม่</h5>
      <div class="row g-3">
        <div class="col-md-6">
  <select id="deptSelect" class="form-select" onchange="toggleOtherInput()">
     <option value="">-- เลือกกลุ่มงานปลายทาง --</option>
     <option>บริหารงานทั่วไป</option>
     <option>บริหารงานบุคคล</option>
     <option>บริหารงานวิชาการ</option>
     <option>บริหารแผนงานและงบประมาณ</option>
     <option>รองผู้อำนวยการ</option>
     <option>ผู้อำนวยการ</option>
     <option>อื่นๆ</option>
  </select>
  <div id="otherNamesContainer" style="display:none;" class="mt-2">
    <div id="nameInputsList">
      <div class="input-group mb-2">
        <input list="staffList" class="form-control other-name-input" placeholder="พิมพ์ชื่อผู้รับคนที่ 1...">
        <button type="button" class="btn btn-outline-success" onclick="addNameField()">➕</button>
      </div>
    </div>
    <small class="text-muted">* สามารถเพิ่มรายชื่อได้โดยกดปุ่ม +</small>
  </div>
  <datalist id="staffList"></datalist>
</div>
        <div class="col-md-6"><input type="file" id="fileInput" class="form-control" multiple></div>
        <div class="col-12">
          <div id="fileListContainer" class="mt-2" style="display:none;">
            <ul id="selectedFilesList" class="list-group mb-3"></ul>
          </div>
        </div>
        <div class="col-12">
          <button onclick="handleUpload()" id="uploadBtn" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">อัปโหลดหนังสือและแจ้งเตือน LINE</button>
        </div>
      </div>
    </div>
    <div class="card p-4 shadow-sm mb-5">
      <div class="row g-2 mb-3 align-items-center">
        <div class="col-12 col-md-2">
          <h5 class="fw-bold m-0 text-dark" style="font-size: 1.1rem;">รายการหนังสือรับ</h5>
        </div>

        <div class="col-6 col-md-2">
          <select id="yearSelect" class="form-select border-success shadow-sm" onchange="resetAndReloadLogs()"></select>
        </div>

        <div class="col-6 col-md-3" id="deptFilterContainer" style="display:none;">
          <select id="deptFilter" class="form-select border-success shadow-sm" onchange="resetAndReloadLogs()">
            <option value="all">🏢 ทุกกลุ่มงาน</option>
            <option>บริหารงานทั่วไป</option>
            <option>บริหารงานบุคคล</option>
            <option>บริหารงานวิชาการ</option>
            <option>บริหารแผนงานและงบประมาณ</option>
            <option>รองผู้อำนวยการ</option>
            <option>ผู้อำนวยการ</option>
            <option>อื่นๆ</option>
            <option>ยังไม่ได้ลงระบบ</option>
          </select>
        </div>

        <div class="col-12 col-md">
          <div class="input-group shadow-sm">
            <span class="input-group-text bg-white border-end-0">🔍</span>
            <input type="text" id="searchInput" class="form-control border-start-0" placeholder="พิมพ์ชื่อหนังสือเพื่อค้นหาอัตโนมัติ..." oninput="handleSearchInput()">
          </div>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle" style="font-size: 0.9rem;">
          <thead class="table-light">
            <tr class="text-center align-middle">
              <th style="width: 20%;">วันที่</th>
              <th style="width: 55%;">ชื่อหนังสือ / ฝ่าย</th>
              <th style="width: 25%;">จัดการ</th>
            </tr>
          </thead>
          <tbody id="bookData"></tbody>
        </table>
      </div>
    </div> </div> </div> 
<script>
  // --- 1. การตั้งค่าสิทธิ์พื้นฐานองค์กร ---
  const GH_OWNER = "specialtrat905";
  const GH_REPO = "smart-saraban";
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx5pGGUyWFLMPjgj1GU5BhuMSwtExAHSDXAf6Ilas66EFjDv1nfyneyCJEl8Cf4a96ffw/exec";

  let currentUser = {};
  let allLogs = [];
  let selectedFilesArray = [];
  let currentYearBE = new Date().getFullYear() + 543;
  let staffNames = [];

  // 🔄 ตัวแปรควบคุมลำดับและสเตทสำหรับระบบ Infinite Scroll
  let currentOffset = 0;
  let currentScrollYear = currentYearBE;
  let isExhausted = false;
  let isLoading = false;

  // ⏱️ ตัวแปรควบคุมหน่วยหน่วงเวลาสำหรับช่องพิมพ์ค้นหาอัตโนมัติ (Debounce)
  let searchTimeout = null;

  // 💾 คลังจัดเก็บสถิติและผลลัพธ์ข้อมูลการเสิร์ชความเร็วสูง (Client-side Query Cache)
  let dataCache = {};

  // --- 2. ระบบสแกนบุคลากรผ่านเซิร์ฟเวอร์คลาวด์ ---
  async function loadStaffList() {
    try {
        const response = await fetch(`${SCRIPT_URL}?type=staff&t=${new Date().getTime()}`);
        staffNames = await response.json(); 
        const list = document.getElementById('staffList');
        if (list) {
            list.innerHTML = staffNames.map(name => `<option value="${name}">`).join('');
        }
    } catch (e) { console.error("โหลดรายชื่อไม่สำเร็จ", e); }
  }

  function addNameField() {
    const container = document.getElementById('nameInputsList');
    const div = document.createElement('div');
    div.className = 'input-group mb-2';
    div.innerHTML = `<input list="staffList" class="form-control other-name-input" placeholder="ระบุชื่อเพิ่มเติม..."><button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()">✕</button>`;
    container.appendChild(div);
  }

  function toggleOtherInput() {
    const dept = document.getElementById('deptSelect').value;
    const container = document.getElementById('otherNamesContainer');
    if (dept === "อื่นๆ") { container.style.display = "block"; } 
    else {
        container.style.display = "none";
        document.getElementById('nameInputsList').innerHTML = `<div class="input-group mb-2"><input list="staffList" class="form-control other-name-input" placeholder="พิมพ์ชื่อผู้รับคนที่ 1..."><button type="button" class="btn btn-outline-success" onclick="addNameField()">➕</button></div>`;
    }
  }

  // --- 3. ระบบรักษาความปลอดภัยและจัดการสิทธิ์การเข้าใช้งาน ---
  function checkSession() {
    const savedUser = localStorage.getItem('sarabanUser');
    const loginTime = localStorage.getItem('loginTime');
    
    if (savedUser && loginTime) {
        const now = new Date().getTime();
        const twoHours = 2 * 60 * 60 * 1000; 
        
        if (now - loginTime < twoHours) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userDisplay').innerText = currentUser.name;
            document.getElementById('roleDisplay').innerText = currentUser.role;

            if(currentUser.role === 'Admin') {
                document.getElementById('logoutBtn').style.display = 'block'; 
                document.getElementById('adminView').style.display = 'block';
                document.getElementById('deptFilterContainer').style.display = 'block';
            } else {
                document.getElementById('logoutBtn').style.display = 'none';  
            }

            updateYearOptions();
            resetAndReloadLogs(); 
        } else {
            logout();
        }
    }
  }

  function logout() {
    localStorage.removeItem('sarabanUser');
    localStorage.removeItem('loginTime');
    location.reload();
  }

  // --- 4. ระบบจัดการไฟล์นำเข้าเอกสารสารบรรณ ---
  document.getElementById('fileInput').addEventListener('change', function(e) {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      if (!selectedFilesArray.some(f => f.name === file.name)) selectedFilesArray.push(file);
    });
    renderFileList();
    this.value = "";
  });

  function renderFileList() {
    const listElement = document.getElementById('selectedFilesList');
    document.getElementById('fileListContainer').style.display = selectedFilesArray.length > 0 ? 'block' : 'none';
    listElement.innerHTML = selectedFilesArray.map((file, index) => `
      <li class="list-group-item d-flex justify-content-between align-items-center file-item py-2">
        <div class="text-truncate" style="max-width: 85%; font-size:0.8rem;">
          <span class="badge bg-success me-2">${index + 1}</span>${file.name}
        </div>
        <span class="btn-remove" onclick="removeFile(${index})">✕ ลบ</span>
      </li>`).join('');
  }

  function removeFile(index) { selectedFilesArray.splice(index, 1); renderFileList(); }

  function copyLink(url) {
    navigator.clipboard.writeText(url).then(() => alert("✅ คัดลอกแล้ว!")).catch(() => {
      const t = document.createElement("textarea"); t.value = url; document.body.appendChild(t); t.select();
      document.execCommand("copy"); document.body.removeChild(t); alert("✅ คัดลอกแล้ว!");
    });
  }

  // --- 5. ระบบคำนวณและสร้าง Dropdown ปี พ.ศ. อัตโนมัติ ---
  function updateYearOptions() {
    const yearSelect = document.getElementById('yearSelect');
    let options = `<option value="all">📂 ดูทั้งหมด (ทุกปี)</option>`;
    
    for (let y = currentYearBE + 1; y >= 2568; y--) {
      options += `<option value="${y}">ปี พ.ศ. ${y}</option>`;
    }
    yearSelect.innerHTML = options;

    // ✨ แก้ไขจุดนี้: บังคับให้ทั้ง Admin และ User ทั่วไป มีค่าเริ่มต้นชี้ไปที่ปีปัจจุบัน (2569) ทั้งหมด
    yearSelect.value = currentYearBE.toString(); 
  }

  // --- 6. ฟังก์ชันเรนเดอร์เนื้อหาตารางและการไฮไลท์คำค้นหา ---
  function displayTable(dataRows) {
    const tableBody = document.getElementById('bookData');
    const deptColors = {
        "บริหารงานวิชาการ": "#ffde59",
        "บริหารแผนงานและงบประมาณ": "#ff5757",
        "บริหารงานบุคคล": "#0cc0df",
        "บริหารงานทั่วไป": "#8c52ff",
        "ผู้อำนวยการ": "#add8e6",
        "รองผู้อำนวยการ": "#d2b48c",
        "อื่นๆ": "#adb5bd"
    };

    let filtered = JSON.parse(JSON.stringify(dataRows));

    if(filtered.length === 0) {
      tableBody.innerHTML = '<tr><td colspan="3" class="text-center p-4 text-muted">ไม่พบข้อมูล</td></tr>';
      return;
    }

    let tableHTML = filtered.map(col => {
      const isMissing = col[0] === "❌";
      let rawDate = isMissing ? "❌" : col[0].split(/[T\s,]+/)[0];
      let dateDisplay = rawDate;

      // 🎯 ระบบ Dual-Format Parser แปลงโครงสร้างปี ค.ศ. เป็น พ.ศ. รองรับประเภทข้อมูล Text และ Date Object
      if (!isMissing) {
          if (rawDate.includes("-")) {
              // 1. รองรับรูปแบบ yyyy-mm-dd (คั่นด้วยเครื่องหมายขีดกลาง จาก Date Object ใน Google Sheets)
              const d = rawDate.split("-"); 
              if (d.length === 3) {
                  let year = parseInt(d[0]);
                  if (year < 2500) year += 543; // 🛡️ Defensive Check: ป้องกันการบวกปีซ้ำซ้อน
                  dateDisplay = `${parseInt(d[2])}/${parseInt(d[1])}/${year}`;
              }
          } else if (rawDate.includes("/")) {
              // 2. รองรับรูปแบบ d/M/yyyy หรือ dd/mm/yyyy (คั่นด้วยเครื่องหมายทับ จาก Text ที่มีเครื่องหมาย ' นำหน้า)
              const d = rawDate.split("/");
              if (d.length === 3) {
                  let year = parseInt(d[2]);
                  if (year < 2500) year += 543; // 🛡️ Defensive Check: ป้องกันการบวกปีซ้ำซ้อน
                  dateDisplay = `${parseInt(d[0])}/${parseInt(d[1])}/${year}`;
              }
          }
      }

      let fullFileName = col[2];
      let cleanFileName = fullFileName;
      let staffBadge = "";

      if (!isMissing) {
          const nameMatch = fullFileName.match(/\[(.*?)\]/);
          if (nameMatch) {
              const names = nameMatch[1];
              cleanFileName = fullFileName.replace(/\[.*?\]/, "").trim();
              staffBadge = `<small class="badge border ms-1" style="font-size: 0.7rem; font-weight: 400; background-color: #adb5bd; color: #fff; border-color: rgba(0,0,0,0.1) !important;">${names}</small>`;
          }

          const searchTerm = document.getElementById('searchInput').value.trim();
          if (searchTerm) {
              const escapedSearch = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex = new RegExp(`(${escapedSearch})`, 'gi');
              cleanFileName = cleanFileName.replace(regex, `<span style="background-color: #fff59d; padding: 2px 2px; border-radius: 3px; font-weight: bold; color: #000;">$1</span>`);
          }
      }

      const deptBadges = (isMissing || currentUser.role !== 'Admin') ? "" : col[3].split(', ').map(d => {
        const color = deptColors[d.trim()] || "#adb5bd"; 
        return `<small class="badge border me-1" style="font-size: 0.7rem; font-weight: 400; background-color: ${color}; color: #fff; border-color: rgba(0,0,0,0.1) !important;">${d}</small>`;
      }).join('');
      
      return `
      <tr class="${isMissing ? 'row-missing' : ''} align-middle">
        <td class="text-center" style="font-size: ${isMissing ? '1.1rem' : '0.75rem'}; color: ${isMissing ? '#ff4d4d' : 'gray'};">
          ${dateDisplay}
        </td>
        <td class="thai-wrap text-start">
           <span class="${isMissing ? '' : 'text-dark'} fw-bold d-block mb-1" style="font-size: 0.85rem;">${cleanFileName}</span>
           <div class="d-flex justify-content-start flex-wrap">
              ${deptBadges}
              ${staffBadge}
           </div>
        </td>
        <td class="text-center">
          <div class="action-buttons justify-content-center">
            ${isMissing ? '' : `<a href="${col[4]}" target="_blank" class="btn btn-sm btn-primary shadow-sm flex-grow-1">เปิดดู</a>
            <button onclick="copyLink('${col[4]}')" class="btn btn-sm btn-copy shadow-sm">คัดลอก</button>`}
          </div>
        </td>
      </tr>`;
    }).join('');

    // ✨ ตรรกะแสดงสถานะเมื่อเลื่อนหน้าจนเกลี้ยงฐานข้อมูล
    if (isExhausted && filtered.length > 0) {
      tableHTML += `<tr><td colspan="3" class="text-center p-3 text-muted fw-bold" style="font-size: 0.8rem; background-color: #f8f9fa; border-top: 1px solid #dee2e6;">-- สิ้นสุดฐานข้อมูล --</td></tr>`;
    }

    tableBody.innerHTML = tableHTML;
  }

  // --- 7. ระบบตรวจสอบสิทธิ์ล็อกอินผ่าน Google ชีตปิด (แก้ปัญหาตัวแดง 429) ---
  async function login() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value.trim();
    try {
      const response = await fetch(`${SCRIPT_URL}?type=login&u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}&t=${new Date().getTime()}`);
      if (!response.ok) throw new Error(`HTTP Status ${response.status}`);
      
      const result = await response.json();

      if (result.success) {
        currentUser = { user: result.user, role: result.role, name: result.name };

        if (currentUser.role === 'Admin') {
            localStorage.setItem('sarabanUser', JSON.stringify(currentUser));
            localStorage.setItem('loginTime', new Date().getTime());
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('adminView').style.display = 'block';
            document.getElementById('deptFilterContainer').style.display = 'block';
        } else {
            localStorage.removeItem('sarabanUser');
            localStorage.removeItem('loginTime');
            document.getElementById('logoutBtn').style.display = 'none';
        }

        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userDisplay').innerText = currentUser.name;
        document.getElementById('roleDisplay').innerText = currentUser.role;
        
        updateYearOptions();
        resetAndReloadLogs();
      } else { 
        document.getElementById('loginErr').innerText = result.message || "รหัสผ่านไม่ถูกต้อง"; 
      }
    } catch(e) { 
      console.error("Login Fetch Error:", e);
      document.getElementById('loginErr').innerText = "ระบบล็อกอินขัดข้อง กรุณาติดต่อผู้ดูแลระบบ"; 
    }
  }

  // --- 8. ฟังก์ชันจัดคิวและดาวน์โหลดข้อมูลสลับหน้าความเสถียรสูง ---
  function resetAndReloadLogs() {
    isLoading = false; // 🔓 บังคับปลดล็อกคิวค้างเพื่อแก้ไขอาการปุ่มเปลี่ยนปีค้าง
    currentOffset = 0;
    isExhausted = false;
    allLogs = [];
    const selectedYear = document.getElementById('yearSelect').value;
    currentScrollYear = (selectedYear === "all") ? currentYearBE : parseInt(selectedYear);
    loadLogs(false);
  }

  function handleSearchInput() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      resetAndReloadLogs();
    }, 1000); // ⏱️ ตั้งหน่วงเวลา 1 วินาทีเมื่อหยุดพิมพ์เพื่อเริ่มค้นหา
  }

  // 🚀 ฟังก์ชันดาวน์โหลดข้อมูลอิงตามสิทธิ์และจัดสรรพารามิเตอร์คัดกรองจากต้นทาง
  async function loadLogs(isAppend = false, retryCount = 0) {
    const selectedYear = document.getElementById('yearSelect').value;
    const selectedDept = (currentUser.role === 'Admin') ? document.getElementById('deptFilter').value : currentUser.role;
    const searchTerm = document.getElementById('searchInput').value.trim();
    const targetYear = (selectedYear === "all") ? currentScrollYear : selectedYear;

    const cacheKey = `${targetYear}_${selectedDept}_${searchTerm}_${currentOffset}`;

    if (!isAppend && retryCount === 0 && dataCache[cacheKey]) {
      const cached = dataCache[cacheKey];
      allLogs = cached.rows;
      isExhausted = cached.isExhausted;
      currentScrollYear = cached.currentScrollYear;
      currentOffset = cached.currentOffset;
      displayTable(allLogs);
      return;
    }

    if (isLoading) return;
    isLoading = true;

    const tableBody = document.getElementById('bookData');
    
    if (!isAppend && retryCount === 0) {
      tableBody.style.opacity = "0.5";
    } else if (isAppend && retryCount === 0) {
      const loadingRow = document.createElement('tr');
      loadingRow.id = 'infinite-scroll-loading';
      loadingRow.innerHTML = `<td colspan="3" class="text-center p-3 bg-light"><div class="spinner-border text-success spinner-border-sm me-2" role="status"></div> <small class="text-muted fw-bold">กำลังโหลดข้อมูลปีเก่าเพิ่มเติม...</small></td>`;
      tableBody.appendChild(loadingRow);
    }

    try {
      // 🎯 ปรับปรุงจุดที่ A: เปลี่ยนช่วงท้ายลิงก์จาก limit=100 เป็น limit=200 เพื่อดึงข้อมูลได้จุใจขึ้น
      const url = `${SCRIPT_URL}?year=${targetYear}&dept=${selectedDept}&search=${encodeURIComponent(searchTerm)}&offset=${currentOffset}&limit=200&t=${new Date().getTime()}`;
      const response = await fetch(url);
      
      if (!response.ok) throw new Error(`HTTP Status ${response.status}`);
      
      const textData = await response.text();
      if (textData.trim().startsWith("<!DOCTYPE") || textData.trim().startsWith("<html")) {
        throw new SyntaxError("Google Infrastructure Timeout");
      }
      
      const newRows = JSON.parse(textData);
      
      const oldLoadingRow = document.getElementById('infinite-scroll-loading');
      if (oldLoadingRow) oldLoadingRow.remove();

      if (isAppend) {
        allLogs = allLogs.concat(newRows);
      } else {
        allLogs = newRows;
      }

      // 🎯 ปรับปรุงจุดที่ B: ขยับเกณฑ์ตัวเลขเป็น 200 แถว และนำตัวดักความยาวเลขศูนย์ออก 
      // เพื่อให้ระบบวิ่งไปควบรวมดึงข้อมูลปีเก่า (2568) มาเติมต่อท้ายให้ผู้ใช้เห็นทันทีอย่างไร้รอยต่อ
      if (newRows.length < 200 && selectedYear === "all" && currentScrollYear > 2568) {
        currentScrollYear--; 
        currentOffset = 0;   
        isLoading = false;
        return loadLogs(true); // 🔄 ยิงคำขอต่อเนื่องไปเอาปีเก่ามาเติมตารางให้เต็มทันที ป้องกันอาการหยุดชะงัก
      } else if (newRows.length < 200) {
        isExhausted = true; 
      } else {
        currentOffset += newRows.length; 
      }

      tableBody.style.opacity = "1";

      dataCache[cacheKey] = {
        rows: JSON.parse(JSON.stringify(allLogs)),
        isExhausted: isExhausted,
        currentScrollYear: currentScrollYear,
        currentOffset: currentOffset
      };

      displayTable(allLogs);
      isLoading = false;
      
    } catch(e) {
      console.warn("Load Logs Failed, Retrying...", e.message);
      isLoading = false;
      tableBody.style.opacity = "1";
      const oldLoadingRow = document.getElementById('infinite-scroll-loading');
      if (oldLoadingRow) oldLoadingRow.remove();

      if (retryCount < 2) {
        setTimeout(() => loadLogs(isAppend, retryCount + 1), 1500);
      } else if (!isAppend) {
        tableBody.innerHTML = '<tr><td colspan="3" class="text-center p-4 text-danger">⚠️ สัญญาณหน่วง กรุณาพิมพ์ตัวอักษรใหม่อีกครั้งเพื่อค้นหา</td></tr>';
      }
    }
  }

  // 🖱️ ตรวจจับเมื่อเลื่อนหน้าจอลงใกล้ถึงขอบตารางล่างสุด ให้ไหลหน้าข้อมูลต่อเนื่อง
  window.addEventListener('scroll', () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 150) {
      if (!isLoading && !isExhausted) {
        loadLogs(true);
      }
    }
  });

  // --- 9. ระบบอัปโหลดและล้างหน่วยความจำแคชภาพรวมเมื่อส่งสำเร็จ ---
  async function handleUpload() {
    const dept = document.getElementById('deptSelect').value;
    if (selectedFilesArray.length === 0 || !dept) return alert("เลือกไฟล์และกลุ่มงานปลายทาง");

    const nameInputs = document.querySelectorAll('.other-name-input');
    let names = [];
    nameInputs.forEach(input => { if (input.value.trim() !== "") names.push(input.value.trim()); });
    const receiverSuffix = names.length > 0 ? ` [${names.join(', ')}]` : "";

    for (let file of selectedFilesArray) {
        const docMatch = file.name.match(/^(\d+-\d+)/);
        if (docMatch) {
            const docNum = docMatch[1];
            const isDuplicate = allLogs.some(log => {
                const existingTitle = log[2].replace(/<[^>]*>?/gm, ''); 
                const existingDept = log[3].trim(); 
                const matchNum = existingTitle.startsWith(docNum);
                const matchDept = existingDept === dept;
                if (matchNum && matchDept && dept === "อื่นๆ") {
                    return existingTitle.includes(`[${names.join(', ')}]`);
                }
                return matchNum && matchDept;
            });
            if (isDuplicate) {
                const proceed = confirm(`⚠️ พบว่าเลขที่ "${docNum}" เคยส่งให้กลุ่มงานนี้แล้ว\nคุณต้องการส่งซ้ำเพื่อเพิ่มรายการใหม่ใช่หรือไม่?`);
                if (!proceed) return; 
            }
        }
    }

    const btn = document.getElementById('uploadBtn'); 
    btn.disabled = true;
    let uploadedFiles = []; 

    for (let file of selectedFilesArray) {
        btn.innerText = `กำลังส่ง: ${file.name.substring(0,10)}...`;
        try {
            const fileData = await new Promise(resolve => { const r = new FileReader(); r.onload = e => resolve(e.target.result); r.readAsDataURL(file); });
            let originalName = file.name.replace(/,/g, "");
            let newFileName = originalName.toLowerCase().endsWith(".pdf") 
                ? originalName.slice(0, -4) + receiverSuffix + ".pdf" 
                : originalName + receiverSuffix;

            const res = await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    department: dept, 
                    sender: currentUser.name, 
                    fileName: newFileName, 
                    fileData: fileData 
                }) 
            });
            const result = await res.json();
            if (result.success) uploadedFiles.push({ name: result.fileName, url: result.url });
        } catch (err) { console.error(err); }
    }

    if (uploadedFiles.length > 0) {
        btn.innerText = "กำลังแจ้งเตือน LINE...";
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "sendBatchNotification", 
                    department: dept,
                    sender: currentUser.name, 
                    fileList: uploadedFiles
                })
            });
        } catch (err) { console.error(err); }
    }

    alert(`สำเร็จ! ส่งหนังสือ ${uploadedFiles.length} ฉบับ เรียบร้อย`);
    selectedFilesArray = []; renderFileList(); btn.disabled = false; btn.innerText = "อัปโหลดหนังสือและแจ้งเตือน LINE";
    
    // 🧼 ล้าง Cache และบังคับเริ่มต้นคิวข้อมูลใหม่จากหลังบ้านทันทีหลังส่งงานสำเร็จ
    dataCache = {}; 
    resetAndReloadLogs();
  }

  // --- 10. ฟังก์ชันติดตั้งความจำและควบคุมการดึงพารามิเตอร์ลิงก์ทางลัดเมื่อโหลดเสร็จ ---
  window.addEventListener('load', () => {
    loadStaffList(); 
    
    // 🧠 ตรรกะผูก Event อัจฉริยะ: ควบคุมช่องค้นหาและ Dropdown อัตโนมัติ ป้องกันปัญหาทางโค้ด HTML ผิดเพี้ยน
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.oninput = handleSearchInput;
        searchInput.onkeypress = null; // ปลดล็อกการดักปุ่ม Enter แบบดั้งเดิมออกทิ้ง
        searchInput.placeholder = "พิมพ์ชื่อหนังสือเพื่อค้นหาอัตโนมัติ...";
    }
    const yearSelect = document.getElementById('yearSelect');
    if (yearSelect) yearSelect.onchange = resetAndReloadLogs;
    
    const deptFilter = document.getElementById('deptFilter');
    if (deptFilter) deptFilter.onchange = resetAndReloadLogs;

    const p = new URLSearchParams(window.location.search);
    if (p.get('u') && p.get('p')) {
        localStorage.clear(); 
        document.getElementById('user').value = p.get('u');
        document.getElementById('pass').value = p.get('p');
        setTimeout(login, 500);
    } else {
        checkSession();
    }
  });
</script>
